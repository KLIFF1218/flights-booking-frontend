name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy to production
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.FRONTEND_DEPLOY_PATH || '/var/www/flights-booking-frontend' }}"

            echo "> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "> Installing dependencies..."
            corepack enable
            pnpm install --frozen-lockfile

            echo "> Building frontend..."
            export NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}"
            export NEXT_PUBLIC_VK_APP_ID="${{ secrets.NEXT_PUBLIC_VK_APP_ID }}"
            export NEXT_PUBLIC_VK_REDIRECT_URL="${{ secrets.NEXT_PUBLIC_VK_REDIRECT_URL }}"
            pnpm build

            echo "> Restarting process manager..."
            if command -v pm2 >/dev/null 2>&1; then
              pm2 restart flights-frontend || pm2 start pnpm --name flights-frontend -- start
            else
              echo "pm2 is not installed; start the app manually with: pnpm start"
            fi

            echo "> Deployment complete!"
